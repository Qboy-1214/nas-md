services:
  nas-md:
    image: ghcr.io/qboy-1214/nas-md:latest
    build: .
    ports:
      - "80:8080"
    volumes:
      - storage:/app/storage
      - tokens:/app/tokens  # Telegram Bot 令牌存储（Web 模式未使用）
      # 挂载主机目录（分号分隔，仅 Admin 可见可写）
      # - /path/to/notes:/mnt/notes
      # - /path/to/docs:/mnt/docs
    environment:
      APP_URL: http://localhost
      STORAGE_DIR: /app/storage
      TOKENS_DIR: /app/tokens  # Telegram Bot 令牌存储（Web 模式未使用）
      WEB_ROOT: /app/web
      WEB_PORT: "8080"
      # 宿主机挂载点（分号分隔的容器内路径，仅 Admin 可见可写）
      # MOUNT_DIRS: /mnt/notes;/mnt/docs
      MOUNT_DIRS: ""
    restart: unless-stopped

volumes:
  storage:
  tokens:  # Telegram Bot 令牌存储（Web 模式未使用）
