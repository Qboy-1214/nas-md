services:
  nas-md:
    image: ghcr.io/qboy-1214/nas-md:latest
    build: .
    ports:
      - "443:8080"  # HTTPS: Docker 模式自动生成自签名证书
    volumes:
      - storage:/app/storage
      - tokens:/app/tokens  # Telegram Bot 令牌存储（Web 模式未使用）
      # 挂载宿主机目录到 /mnt/ 下，应用自动扫描并显示
      # 默认仅 Admin 可见可写；加入 PUBLIC_MOUNTS 则所有人可见可写
      # - /home/yong/n8n/file:/mnt/n8n
      # - /home/yong/docs:/mnt/docs
    environment:
      APP_URL: https://localhost
      STORAGE_DIR: /app/storage
      TOKENS_DIR: /app/tokens  # Telegram Bot 令牌存储（Web 模式未使用）
      WEB_ROOT: /app/web
      WEB_PORT: "8080"
      DOCKER_MODE: "1"
      TZ: "Asia/Shanghai"  # 时区配置，影响定时任务和日期显示
      # MOUNT_DIRS: 无需设置，应用自动扫描 /mnt/ 子目录
      # 如需手动指定，可用 "显示名:路径" 格式，分号分隔
      # PUBLIC_MOUNTS: 指定哪些 /mnt/ 子目录对所有人可见（逗号分隔）
      # 例如: PUBLIC_MOUNTS: "docs,photos"
      # PUBLIC_MOUNT_DIRS: 指定非 /mnt/ 下的公开目录（分号分隔）
      # 例如: PUBLIC_MOUNT_DIRS: "/home/user/shared"
    restart: unless-stopped

volumes:
  storage:
  tokens:  # Telegram Bot 令牌存储（Web 模式未使用）
