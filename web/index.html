<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nas-md</title>
    <link rel="stylesheet" href="lib/fonts/inter.css" />
    <link rel="stylesheet" href="lib/vditor/index.css" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="layout">
      <!-- 侧边栏 -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="logo" onclick="navigateHome()">nas-md</div>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
          <svg
            class="search-icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="var(--c-steel)"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <input
            type="text"
            id="search-input"
            placeholder="搜索笔记..."
            oninput="doSearch()"
            class="search-input"
          />
          <div id="search-results" class="search-results"></div>
        </div>

        <!-- 文件树 -->
        <nav id="file-tree" class="file-tree"></nav>

        <!-- 最近访问 -->
        <div class="recent-files" id="recent-files"></div>

        <!-- 底部按钮 -->
        <div class="sidebar-footer">
          <button class="nav-btn" onclick="chooseDirectory()">挂载文件夹</button>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="main">
        <!-- 顶部栏 -->
        <header class="topbar">
          <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()" title="菜单">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <span class="breadcrumb" id="breadcrumb"></span>
          <button
            class="rename-top-btn"
            id="rename-top-btn"
            onclick="showRenameModal()"
            title="重命名"
            style="display: none"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
          </button>
          <button
            class="rename-top-btn delete-top-btn"
            id="delete-top-btn"
            onclick="deleteCurrentFile()"
            title="删除文件"
            style="display: none"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="3 6 5 6 21 6" />
              <path
                d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
              />
            </svg>
          </button>
          <div class="topbar-actions">
            <div class="editor-modes" id="editor-modes" style="display: none">
              <button onclick="setEditorMode('ir')">即时渲染</button>
              <button onclick="setEditorMode('sv')">分屏预览</button>
              <button onclick="setEditorMode('wysiwyg')">所见即所得</button>
            </div>
            <div class="save-group" id="save-group" style="display: none">
              <button class="save-btn" id="btn-save" onclick="saveFile()" title="保存 (Ctrl+S)">
                保存
              </button>
              <label class="autosave-toggle" title="自动保存">
                <input
                  type="checkbox"
                  id="autosave-switch"
                  onchange="toggleAutoSave(this.checked)"
                />
                <span class="autosave-slider"></span>
              </label>
            </div>
            <button
              class="outline-toggle-btn"
              id="btn-refresh"
              onclick="refreshFromDisk()"
              title="从磁盘重新加载"
              style="display: none"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 2v6h-6" />
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
                <path d="M3 22v-6h6" />
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
              </svg>
            </button>
            <button
              class="outline-toggle-btn"
              id="btn-outline"
              onclick="if (window._toggleOutline) window._toggleOutline();"
              title="大纲 (Ctrl+O)"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="15" y2="6"></line>
                <line x1="3" y1="18" x2="17" y2="18"></line>
              </svg>
            </button>
            <button class="outline-toggle-btn" onclick="toggleDarkMode()" title="切换暗色模式">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </svg>
            </button>
          </div>
        </header>

        <!-- 编辑器区域 -->
        <div class="editor-area">
          <!-- 编辑器 -->
          <div class="editor-container" id="editor-container">
            <div id="vditor"></div>
            <!-- 反向链接面板 -->
            <div id="backlinks-panel" class="backlinks-panel" style="display: none">
              <div class="backlinks-header" onclick="toggleBacklinks()">
                <span class="backlinks-title" id="backlinks-title">反向链接 (0)</span>
                <span class="backlinks-toggle" id="backlinks-toggle">▼</span>
              </div>
              <div class="backlinks-content" id="backlinks-content"></div>
            </div>
          </div>

          <!-- 隐藏的文件选择器，用于选择文件夹（非安全上下文 fallback） -->
          <input
            type="file"
            id="dir-picker"
            webkitdirectory
            style="display: none"
            onchange="onDirPicked(event)"
          />

          <!-- 知识图谱页 -->
          <div id="graph-page" class="graph-page" style="display: none">
            <h1>知识图谱</h1>
            <div id="graph-container" class="graph-container"></div>
          </div>

          <!-- 数据看板页 -->
          <div id="dashboard-page" class="dashboard-page" style="display: none">
            <h1>数据看板</h1>
            <div class="dashboard-grid">
              <div class="dash-card">
                <div class="dash-value" id="dash-files">0</div>
                <div class="dash-label">笔记总数</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-tasks-done">0</div>
                <div class="dash-label">已完成任务</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-tasks-total">0</div>
                <div class="dash-label">任务总数</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-task-rate">0%</div>
                <div class="dash-label">完成率</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-tags">0</div>
                <div class="dash-label">标签数</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-links">0</div>
                <div class="dash-label">链接数</div>
              </div>
            </div>
            <h2>最近访问</h2>
            <div id="dash-recent" class="dash-recent"></div>
            <h2>孤立页面</h2>
            <div id="dash-orphans" class="dash-recent"></div>
          </div>
        </div>
      </main>

      <!-- 新建文件对话框 -->
      <div class="modal-overlay" id="new-file-modal" style="display: none">
        <div class="modal">
          <div class="modal-header-row">
            <h3>新建笔记</h3>
            <button class="modal-close" onclick="hideNewFile()">✕</button>
          </div>
          <input
            type="text"
            id="new-file-name"
            placeholder="文件名（如 My Note.md）"
            class="modal-input"
          />
          <div class="modal-actions">
            <button onclick="hideNewFile()">取消</button>
            <button class="primary-btn" onclick="confirmNewFile()">创建</button>
          </div>
        </div>
      </div>

      <!-- 消息提示 -->
      <div class="toast" id="toast" style="display: none"></div>

      <script src="lib/vditor/index.min.js"></script>
      <script src="lib/d3/d3.min.js"></script>
      <script src="files.js"></script>
      <script src="editor.js"></script>
      <script src="app.js"></script>
    </div>
  </body>
</html>
