<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nas-md</title>
    <link rel="stylesheet" href="lib/fonts/inter.css" />
    <link rel="stylesheet" href="lib/vditor/index.css" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="layout">
      <!-- 侧边栏 -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="logo" onclick="navigateHome()">nas-md</div>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
          <svg
            class="search-icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="var(--c-steel)"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <input
            type="text"
            id="search-input"
            placeholder="搜索笔记..."
            oninput="doSearch()"
            class="search-input"
          />
          <div id="search-results" class="search-results"></div>
        </div>

        <!-- 文件树 -->
        <nav id="file-tree" class="file-tree"></nav>

        <!-- 底部按钮 -->
        <div class="sidebar-footer">
          <button class="nav-btn" onclick="navigateHome()">首页</button>
          <button class="nav-btn" onclick="showGraph()">图谱</button>
          <button class="nav-btn" onclick="showDashboard()">看板</button>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="main">
        <!-- 顶部栏 -->
        <header class="topbar">
          <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()" title="菜单">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <span class="breadcrumb" id="breadcrumb"></span>
          <div class="topbar-actions">
            <div class="editor-modes" id="editor-modes" style="display: none">
              <button onclick="setEditorMode('ir')">即时渲染</button>
              <button onclick="setEditorMode('sv')">分屏预览</button>
              <button onclick="setEditorMode('wysiwyg')">所见即所得</button>
            </div>
            <div class="save-group" id="save-group" style="display: none">
              <button class="save-btn" id="btn-save" onclick="saveFile()" title="保存 (Ctrl+S)">
                保存
              </button>
              <label class="autosave-toggle" title="自动保存">
                <input
                  type="checkbox"
                  id="autosave-switch"
                  onchange="toggleAutoSave(this.checked)"
                />
                <span class="autosave-slider"></span>
              </label>
            </div>
            <button
              class="outline-toggle-btn"
              id="btn-outline"
              onclick="if (window._toggleOutline) window._toggleOutline();"
              title="大纲 (Ctrl+O)"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="15" y2="6"></line>
                <line x1="3" y1="18" x2="17" y2="18"></line>
              </svg>
            </button>
            <button class="outline-toggle-btn" onclick="toggleDarkMode()" title="切换暗色模式">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </svg>
            </button>
          </div>
        </header>

        <!-- 编辑器区域 -->
        <div class="editor-area">
          <!-- 欢迎页 -->
          <div id="welcome-page" class="welcome-page">
            <div class="welcome-hero">
              <div class="welcome-logo">nas-md</div>
              <p class="welcome-subtitle">个人知识管理系统</p>
              <p class="welcome-desc">
                轻量、快速的 Markdown 笔记管理器。输入目录路径即可浏览、搜索和编辑你的笔记。
              </p>
            </div>

            <!-- 快速操作 -->
            <div class="quick-actions">
              <div
                class="quick-action-card"
                onclick="document.getElementById('new-dir-path').focus()"
              >
                <div class="quick-action-icon tint-sky">
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="var(--c-link)"
                    stroke-width="2"
                  >
                    <path
                      d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                    />
                  </svg>
                </div>
                <div class="quick-action-title">打开目录</div>
                <div class="quick-action-desc">浏览并挂载一个本地目录</div>
              </div>
              <div class="quick-action-card" onclick="showNewFile()">
                <div class="quick-action-icon tint-mint">
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="var(--c-brand-green)"
                    stroke-width="2"
                  >
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="12" y1="18" x2="12" y2="12" />
                    <line x1="9" y1="15" x2="15" y2="15" />
                  </svg>
                </div>
                <div class="quick-action-title">新建笔记</div>
                <div class="quick-action-desc">在当前目录下创建新的 Markdown 文件</div>
              </div>
              <div class="quick-action-card" onclick="chooseDirectory()">
                <div class="quick-action-icon tint-lavender">
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="var(--c-brand-purple)"
                    stroke-width="2"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                  </svg>
                </div>
                <div class="quick-action-title">导入文件</div>
                <div class="quick-action-desc">选择目录批量导入现有笔记</div>
              </div>
            </div>

            <!-- 打开目录 -->
            <div class="open-dir-section">
              <label class="section-label">打开目录</label>
              <div class="open-dir-input-group">
                <input
                  type="text"
                  id="new-dir-path"
                  placeholder="输入目录路径，或点击浏览选择"
                  class="open-dir-input"
                  onclick="chooseDirectory()"
                />
                <input
                  type="text"
                  id="new-dir-name"
                  placeholder="显示名称（可选）"
                  class="open-dir-name-input"
                />
                <button class="browse-btn" onclick="chooseDirectory()">浏览…</button>
                <button class="primary-btn" onclick="openDirectory()">打开</button>
                <!-- 隐藏的文件选择器，用于选择文件夹 -->
                <input
                  type="file"
                  id="dir-picker"
                  webkitdirectory
                  style="display: none"
                  onchange="onDirPicked(event)"
                />
              </div>
            </div>

            <!-- 已挂载的目录 -->
            <div class="mounted-dirs" id="mounted-dirs"></div>

            <!-- 最近修改 -->
            <div class="recent-files" id="recent-files"></div>
          </div>

          <!-- 编辑器 -->
          <div class="editor-container" id="editor-container" style="display: none">
            <div id="vditor"></div>
            <!-- 反向链接面板 -->
            <div id="backlinks-panel" class="backlinks-panel" style="display: none">
              <div class="backlinks-header" onclick="toggleBacklinks()">
                <span class="backlinks-title" id="backlinks-title">反向链接 (0)</span>
                <span class="backlinks-toggle" id="backlinks-toggle">▼</span>
              </div>
              <div class="backlinks-content" id="backlinks-content"></div>
            </div>
          </div>

          <!-- 知识图谱页 -->
          <div id="graph-page" class="graph-page" style="display: none">
            <h1>知识图谱</h1>
            <div id="graph-container" class="graph-container"></div>
          </div>

          <!-- 数据看板页 -->
          <div id="dashboard-page" class="dashboard-page" style="display: none">
            <h1>数据看板</h1>
            <div class="dashboard-grid">
              <div class="dash-card">
                <div class="dash-value" id="dash-files">0</div>
                <div class="dash-label">笔记总数</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-tasks-done">0</div>
                <div class="dash-label">已完成任务</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-tasks-total">0</div>
                <div class="dash-label">任务总数</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-task-rate">0%</div>
                <div class="dash-label">完成率</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-tags">0</div>
                <div class="dash-label">标签数</div>
              </div>
              <div class="dash-card">
                <div class="dash-value" id="dash-links">0</div>
                <div class="dash-label">链接数</div>
              </div>
            </div>
            <h2>最近修改</h2>
            <div id="dash-recent" class="dash-recent"></div>
            <h2>孤立页面</h2>
            <div id="dash-orphans" class="dash-recent"></div>
          </div>
        </div>
      </main>

      <!-- 新建文件对话框 -->
      <div class="modal-overlay" id="new-file-modal" style="display: none">
        <div class="modal">
          <div class="modal-header-row">
            <h3>新建笔记</h3>
            <button class="modal-close" onclick="hideNewFile()">✕</button>
          </div>
          <input
            type="text"
            id="new-file-name"
            placeholder="文件名（如 My Note.md）"
            class="modal-input"
          />
          <div class="modal-actions">
            <button onclick="hideNewFile()">取消</button>
            <button class="primary-btn" onclick="confirmNewFile()">创建</button>
          </div>
        </div>
      </div>

      <!-- 消息提示 -->
      <div class="toast" id="toast" style="display: none"></div>

      <script src="lib/vditor/index.min.js"></script>
      <script src="lib/d3/d3.min.js"></script>
      <script src="files.js"></script>
      <script src="editor.js"></script>
      <script src="app.js"></script>
    </div>
  </body>
</html>
